<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>Reset Password</title>
    <link rel="stylesheet" href="reset-password.css" />
  </head>
  <body>
    <div class="auth-card">
      <!-- BACK -->
      <a href="verifikasi.html" class="back">←</a>

      <!-- ICON -->
      <div class="icon">🔑</div>

      <!-- TITLE -->
      <h2>Change Password</h2>

      <p>Masukkan password baru kamu untuk melanjutkan.</p>

      <!-- INPUT -->
      <div class="input-group">
        <input id="passwordBaru" type="password" placeholder="New Password" />
      </div>
      <!-- PASSWORD RULE -->
      <div class="password-rules">
        <p>Password must:</p>

        <div id="rule-length">Minimal 6 karakter</div>
        <div id="rule-upper">Minimal 1 huruf besar</div>
        <div id="rule-lower">Minimal 1 huruf kecil</div>
        <div id="rule-number">Minimal 1 angka</div>
      </div>

      <div class="input-group">
        <input id="konfirmasi" type="password" placeholder="Confirm Password" />
      </div>

      <!-- BUTTON -->
      <button onclick="resetPassword()">CONFIRM CHANGE</button>
    </div>

    <script>
      function resetPassword() {
        const passwordBaru = document.getElementById("passwordBaru").value;
        const konfirmasi = document.getElementById("konfirmasi").value;

        const params = new URLSearchParams(window.location.search);
        const email = params.get("email");

        if (!passwordBaru || !konfirmasi) {
          alert("Isi semua field!");
          return;
        }

        const validPassword =
          passwordBaru.length >= 6 &&
          /[A-Z]/.test(passwordBaru) &&
          /[a-z]/.test(passwordBaru) &&
          /[0-9]/.test(passwordBaru);

        if (!validPassword) {
          alert("Password belum memenuhi syarat!");
          return;
        }

        if (passwordBaru !== konfirmasi) {
          alert("Password tidak sama!");
          return;
        }

        fetch("http://localhost:3001/api/auth/reset-password", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({
            email: email,
            password: passwordBaru,
          }),
        })
          .then((res) => res.json())
          .then((data) => {
            if (data.success) {
              alert("Password berhasil diubah!");
              window.location.href = "index.html";
            } else {
              alert(data.message);
            }
          })
          .catch((err) => {
            console.error(err);
            alert("Server error!");
          });
      }

      // 🔥 TAMBAHKAN DI SINI
      const passwordInput = document.getElementById("passwordBaru");

      if (passwordInput) {
        passwordInput.addEventListener("input", () => {
          const val = passwordInput.value;

          updateRule("rule-length", val.length >= 6);
          updateRule("rule-upper", /[A-Z]/.test(val));
          updateRule("rule-lower", /[a-z]/.test(val));
          updateRule("rule-number", /[0-9]/.test(val));
        });
      }

      function updateRule(id, valid) {
        const el = document.getElementById(id);
        if (!el) return;

        if (valid) {
          el.classList.add("valid");
        } else {
          el.classList.remove("valid");
        }
      }
    </script>
  </body>
</html>
