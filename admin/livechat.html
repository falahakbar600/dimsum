<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Live Chat - Dapur Anak GEN Z</title>

    <link rel="stylesheet" href="livechat.css" />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>

  <body>
    <!-- 🔐 LOGIN CHECK -->
    <script>
      const isLogin = localStorage.getItem("isLogin");
      const role = localStorage.getItem("role");

      if (isLogin !== "true" || role !== "admin") {
        window.location.href = "../index.html";
      }
    </script>

    <!-- 🍔 HAMBURGER -->
    <button class="menu-toggle" onclick="toggleSidebar()">☰</button>

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-logo">
        <h2>Dapur Gen Z</h2>
      </div>

      <a href="dashboard.html"> Dashboard</a>
      <a href="products.html">Products</a>
      <a href="orders.html">Orders</a>
      <a href="livechat.html" class="active"> Live Chat</a>
      <a href="reviews.html">Reviews</a>
      <a href="#" onclick="logout()">Logout</a>
    </aside>

    <!-- MAIN -->
    <main class="main">
      <!-- TOPBAR -->
      <div class="topbar">
        <div>
          <h1>Live Chat Customer</h1>
          <p class="topbar-subtitle">
            Kelola komunikasi customer secara real-time
          </p>
        </div>

        <div class="topbar-info-card">
          <div class="icon-box">💬</div>
          <div>
            <h4>Customer Support</h4>
            <p>Balas pesan customer dengan cepat & profesional</p>
          </div>
        </div>
      </div>

      <!-- CHAT CONTAINER -->
      <div class="admin-livechat-container">
        <!-- CUSTOMER SIDEBAR -->
        <div class="chat-sidebar card">
          <div class="panel-header">
            <h3>Daftar Customer</h3>
          </div>

          <div class="chat-user-list" id="chatUserList"></div>
        </div>

        <!-- CHAT MAIN -->
        <div class="chat-main card">
          <!-- HEADER -->
          <div class="chat-header" id="chatCustomerName">
            <div class="chat-user-info">
              <div class="chat-avatar">👤</div>
              <div>
                <h2>Pilih Customer</h2>
                <span>Status: Menunggu dipilih</span>
              </div>
            </div>
          </div>

          <!-- BODY -->
          <div class="chat-body" id="chatBody">
            <p class="empty-chat">Belum ada percakapan</p>
          </div>

          <!-- QUICK ACTION -->
          <div class="quick-actions">
            <button onclick="quickReply('Pesanan Diproses')">
              Pesanan Diproses
            </button>

            <button onclick="quickReply('Verifikasi Pembayaran')">
              Verifikasi Pembayaran
            </button>

            <button onclick="quickReply('Pesanan Selesai')">
              Pesanan Selesai
            </button>

            <button onclick="quickReply('Minta Bukti Bayar')">
              Minta Bukti Bayar
            </button>
          </div>

          <!-- FOOTER -->
          <div class="chat-footer">
            <input
              type="text"
              id="adminReplyInput"
              placeholder="Tulis balasan..."
            />

            <button onclick="sendAdminReply()">Kirim</button>
          </div>
        </div>
      </div>
    </main>

    <!-- SCRIPT -->
    <script src="admin.js"></script>

    <script>
      // =========================
      // 🔐 LOGOUT
      // =========================
      function logout() {
        localStorage.removeItem("isLogin");
        localStorage.removeItem("role");
        localStorage.removeItem("nama");

        window.location.href = "../index.html";
      }

      // =========================
      // 🍔 SIDEBAR MOBILE
      // =========================
      function toggleSidebar() {
        const sidebar = document.getElementById("sidebar");

        if (sidebar) {
          sidebar.classList.toggle("show");
        }
      }

      // =========================
      // 👤 ADMIN NAME
      // =========================
      const nama = localStorage.getItem("nama") || "Admin";
    </script>
  </body>
</html>
