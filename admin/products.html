<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Products - Admin Dapur Anak GEN Z</title>
    <link rel="stylesheet" href="admin.css" />
  </head>
  <body>
    <!-- GANTI SIDEBAR LAMA -->
    <div class="sidebar">
      <h2>Dapur Gen Z</h2>
      <a href="dashboard.html">Dashboard</a>
      <a href="products.html" class="active">Products</a>
      <a href="orders.html">Orders</a>
      <a href="livechat.html">Live Chat</a>
      <a href="reviews.html">Reviews</a>
      <a href="#" onclick="logout()">Logout</a>
    </div>
    <div class="main">
      <h1>Management Products</h1>

      <div class="card">
        <h3>Tambah Produk Baru</h3>
        <div
          style="
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 15px;
          "
        >
          <input
            type="text"
            id="nama"
            placeholder="Nama Produk (Contoh: Somayyy)"
          />
          <input type="number" id="harga" placeholder="Harga (Contoh: 18000)" />
          <input type="number" id="stok" placeholder="Stok (Contoh: 10)" />
          <textarea
            id="deskripsi"
            placeholder="Deskripsi produk (contoh: Dimsum isi ayam lembut)"
            rows="3"
          ></textarea>
          <div class="file-upload">
            <label for="gambar">📁 Pilih Gambar</label>
            <input type="file" id="gambar" accept="image/*" />
          </div>
          <button class="btn btn-primary" onclick="tambahProduk()">
            Tambah Menu
          </button>
        </div>
      </div>

      <h2 style="margin-top: 30px">List Produk di Database</h2>
      <div class="grid" id="listProduk">
        <p>Memuat data produk...</p>
      </div>
    </div>
    <!-- TAMBAHKAN SCRIPT LOGIN + LOGOUT DI ATAS SCRIPT UTAMA -->
    <script>
      const isLogin = localStorage.getItem("isLogin");
      const role = localStorage.getItem("role");

      if (isLogin !== "true" || role !== "admin") {
        window.location.href = "../home.html";
      }

      function logout() {
        localStorage.removeItem("isLogin");
        localStorage.removeItem("role");
        localStorage.removeItem("nama");
        window.location.href = "../home.html";
      }
    </script>
    <script>
      // Alamat API Backend Node.js
      const API_URL = "http://localhost:3001/api/products";

      // 1. Fungsi untuk Mengambil Data dari MySQL dan Menampilkannya
      async function loadProducts() {
        try {
          const response = await fetch(API_URL);
          const products = await response.json();
          const container = document.getElementById("listProduk");

          container.innerHTML = ""; // Bersihkan kontainer

          if (products.length === 0) {
            container.innerHTML = "<p>Belum ada produk di database.</p>";
            return;
          }

          products.forEach((item) => {
            // PERBAIKAN: Menggunakan item.id dan item.nama sesuai struktur database
            // Jika gambar tidak muncul, pastikan folder gambarnya benar (misal: ../gambar/${item.gambar})
            container.innerHTML += `
  <div class="product-card">
    <img src="http://localhost:3001/gambar/${item.gambar}" 
         onerror="this.onerror=null; this.src='http://localhost:3001/gambar/default.png';">

    <h4>${item.nama}</h4>
    <p>Rp ${parseInt(item.harga).toLocaleString("id-ID")}</p>

    <button class="edit-btn" onclick="editProduk(${item.id})">Edit</button>
<button onclick="hapusProduk(${item.id})">Hapus</button>
  </div>
`;
          });
        } catch (error) {
          console.error("Gagal memuat produk:", error);
          document.getElementById("listProduk").innerHTML =
            "<p>Gagal terhubung ke server backend.</p>";
        }
      }

      async function tambahProduk() {
        const nama = document.getElementById("nama").value;
        const harga = document.getElementById("harga").value;
        const deskripsi = document.getElementById("deskripsi").value;
        const stok = document.getElementById("stok").value; // 🔥 TAMBAH
        const gambar = document.getElementById("gambar").files[0];

        if (!nama || !harga || !gambar || !deskripsi || !stok) {
          alert("Harap isi semua kolom!");
          return;
        }

        const formData = new FormData();
        formData.append("nama", nama);
        formData.append("harga", harga);
        formData.append("deskripsi", deskripsi);
        formData.append("stok", stok); // 🔥 TAMBAH
        formData.append("gambar", gambar);

        try {
          const response = await fetch("http://localhost:3001/api/products", {
            method: "POST",
            body: formData,
          });

          if (response.ok) {
            alert("Produk berhasil ditambahkan!");

            document.getElementById("nama").value = "";
            document.getElementById("harga").value = "";
            document.getElementById("deskripsi").value = "";
            document.getElementById("stok").value = ""; // 🔥 TAMBAH
            document.getElementById("gambar").value = "";

            loadProducts();
          } else {
            alert("Gagal tambah produk");
          }
        } catch (err) {
          console.error(err);
          alert("Server error");
        }
      }

      // 3. Fungsi untuk Hapus Produk
      async function hapusProduk(id) {
        if (confirm("Yakin ingin menghapus produk ini?")) {
          try {
            const response = await fetch(`${API_URL}/${id}`, {
              method: "DELETE",
            });
            if (response.ok) {
              loadProducts();
            }
          } catch (error) {
            console.error("Gagal menghapus:", error);
          }
        }
      }

      window.onload = loadProducts;

      async function editProduk(id) {
        try {
          const response = await fetch(API_URL);
          const products = await response.json();

          const product = products.find((p) => p.id == id);

          document.getElementById("editId").value = product.id;
          document.getElementById("editNama").value = product.nama;
          document.getElementById("editHarga").value = product.harga;
          document.getElementById("editStok").value = product.stok;
          document.getElementById("editDeskripsi").value = product.deskripsi;

          document.getElementById("editModal").style.display = "block";
        } catch (error) {
          console.error(error);
          alert("Gagal membuka data produk");
        }
      }
      async function saveEditProduk() {
        const id = document.getElementById("editId").value;

        const nama = document.getElementById("editNama").value;
        const harga = document.getElementById("editHarga").value;
        const stok = document.getElementById("editStok").value;
        const deskripsi = document.getElementById("editDeskripsi").value;

        try {
          const response = await fetch(`${API_URL}/${id}`, {
            method: "PUT",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              nama,
              harga,
              stok,
              deskripsi,
            }),
          });

          const data = await response.json();

          if (data.success) {
            alert("Produk berhasil diupdate!");
            closeEditModal();
            loadProducts();
          } else {
            alert("Gagal update produk!");
          }
        } catch (error) {
          console.error(error);
          alert("Server error!");
        }
      }
      window.onclick = function (event) {
        const modal = document.getElementById("editModal");
        if (event.target == modal) {
          modal.style.display = "none";
        }
      };
      function closeEditModal() {
        document.getElementById("editModal").style.display = "none";
      }
    </script>
    <!-- MODAL EDIT PRODUK -->
    <div id="editModal" class="modal">
      <div class="modal-content">
        <span class="close" onclick="closeEditModal()">&times;</span>
        <h2>Edit Produk</h2>

        <input type="hidden" id="editId" />

        <label>Nama Produk</label>
        <input type="text" id="editNama" />

        <label>Harga</label>
        <input type="number" id="editHarga" />

        <label>Stok</label>
        <input type="number" id="editStok" />

        <label>Deskripsi</label>
        <textarea id="editDeskripsi"></textarea>

        <button onclick="saveEditProduk()">Simpan Perubahan</button>
      </div>
    </div>
  </body>
</html>
